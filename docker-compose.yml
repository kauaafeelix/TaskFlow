version: '3.8'
services:
  db:
    image: postgres:16
    container_name: taskflow-db
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: taskflow-app
    depends_on:
      - db
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
volumes:
  postgres_data: